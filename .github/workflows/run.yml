name: Startup News Bot

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 0 * * *"  # 定期的に実行

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "lxml-html-clean==0.4.1"
          pip install spacy
          pip install google
          python -m spacy download ja_core_news_sm  # 日本語モデルのダウンロード

      - name: Run bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python src/main.py  # main.pyの実行

      - name: Send Slack notification
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{"text":"Job completed successfully!"}' ${{ secrets.SLACK_WEBHOOK_URL }}
