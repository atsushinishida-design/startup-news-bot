name: Startup News Bot

on:
  workflow_dispatch: {}
  schedule:
    # GitHub ActionsのcronはUTC。例: JST 9:00 = UTC 0:00
    - cron: "0 0 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Verify lxml clean
        run: |
          pip show lxml-html-clean
          python -c "import lxml.html.clean; print('OK: lxml.html.clean import')"
          
      - name: Show installed packages (check)
        run: |
          pip show lxml
          pip show lxml-html-clean || pip show lxml_html_clean || true
          python -c "import lxml.html.clean; print('lxml.html.clean import OK')"
          
      - name: Run bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # ログインが必要なサイトが増えたらSecretsを追加してenvに並べる（例）
          # EXAMPLE_USER: ${{ secrets.EXAMPLE_USER }}
          # EXAMPLE_PASS: ${{ secrets.EXAMPLE_PASS }}
        run: |
          python src/main.py
